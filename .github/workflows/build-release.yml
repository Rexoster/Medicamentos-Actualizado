name: Generar actualización firmada

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Preparar versión automática
        run: |
          echo "APP_VERSION_CODE=$((10000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=3.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Validar secretos de firma
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || (echo "Falta ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Falta ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Falta ANDROID_KEY_ALIAS" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "Falta ANDROID_KEY_PASSWORD" && exit 1)
          echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.keystore"

      - name: Dar permiso a Gradle
        run: chmod +x gradlew

      - name: Ejecutar pruebas
        run: ./gradlew testDebugUnitTest

      - name: Generar APK y AAB firmados
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Renombrar archivos
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            "HerramientasClinicas-${APP_VERSION_NAME}.apk"
          cp app/build/outputs/bundle/release/app-release.aab \
            "HerramientasClinicas-${APP_VERSION_NAME}.aab"

      - name: Publicar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: HerramientasClinicas-${{ env.APP_VERSION_NAME }}
          path: |
            HerramientasClinicas-${{ env.APP_VERSION_NAME }}.apk
            HerramientasClinicas-${{ env.APP_VERSION_NAME }}.aab
          if-no-files-found: error

      - name: Crear versión descargable en GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${APP_VERSION_NAME}" \
            "HerramientasClinicas-${APP_VERSION_NAME}.apk" \
            "HerramientasClinicas-${APP_VERSION_NAME}.aab" \
            --title "Herramientas Clínicas ${APP_VERSION_NAME}" \
            --notes "Actualización firmada. Puede instalarse sobre una versión anterior firmada con la misma clave."
